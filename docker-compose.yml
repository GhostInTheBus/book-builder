services:
  busflicks-landing:
    image: nginx:alpine
    container_name: busflicks-landing
    restart: always
    ports:
      - "8099:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - book-builder-net

networks:
  book-builder-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.46.0/24
