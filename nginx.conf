server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files normally
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy Tunarr HLS stream
    location /stream/ {
        proxy_pass http://host.docker.internal:8001/stream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    # Proxy Tunarr API (channels list etc.)
    location /tunarr-api/ {
        proxy_pass http://host.docker.internal:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
