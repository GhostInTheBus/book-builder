    <rect x="560" y="460" width="48" height="44" rx="1" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <rect x="614" y="460" width="48" height="44" rx="1" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
