<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560" style="font-family: system-ui, sans-serif;">
  <!-- App background -->
  <rect width="960" height="560" fill="#0a0908"/>

  <!-- Top bar -->
  <rect width="960" height="36" fill="#0d0c0b"/>
  <rect width="960" height="1" y="36" fill="rgba(255,255,255,0.04)"/>
  <text x="16" y="23" font-size="10" font-weight="900" fill="#f97316" letter-spacing="2" text-anchor="start" font-family="monospace">BOOK BUILDER</text>

  <!-- ── LEFT: Page Navigator ── -->
  <rect x="0" y="37" width="160" height="523" fill="#0d0c0b"/>
  <rect x="160" y="37" width="1" height="523" fill="rgba(255,255,255,0.04)"/>
  <text x="12" y="57" font-size="8" fill="rgba(255,255,255,0.2)" letter-spacing="3" font-family="monospace">PAGES</text>

  <!-- Page rows -->
  <g opacity="0.85">
    <!-- Cover row (active) -->
    <rect x="8" y="64" width="144" height="22" rx="2" fill="rgba(249,115,22,0.12)" stroke="rgba(249,115,22,0.25)" stroke-width="0.5"/>
    <circle cx="18" cy="75" r="3" fill="#f97316"/>
    <text x="28" y="79" font-size="8" fill="rgba(249,115,22,0.9)" font-family="monospace">Cover</text>
    <text x="120" y="79" font-size="7" fill="rgba(255,255,255,0.2)" font-family="monospace">1–2</text>

    <!-- Spread rows -->
    <rect x="8" y="90" width="144" height="22" rx="2" fill="rgba(255,255,255,0.02)"/>
    <circle cx="18" cy="101" r="2" fill="rgba(255,255,255,0.1)"/>
    <text x="28" y="105" font-size="8" fill="rgba(255,255,255,0.3)" font-family="monospace">Spread 2</text>
    <text x="120" y="105" font-size="7" fill="rgba(255,255,255,0.15)" font-family="monospace">3–4</text>

    <rect x="8" y="116" width="144" height="22" rx="2" fill="rgba(255,255,255,0.02)"/>
    <circle cx="18" cy="127" r="2" fill="rgba(255,255,255,0.1)"/>
    <text x="28" y="131" font-size="8" fill="rgba(255,255,255,0.3)" font-family="monospace">Spread 3</text>
    <text x="120" y="131" font-size="7" fill="rgba(255,255,255,0.15)" font-family="monospace">5–6</text>

    <rect x="8" y="142" width="144" height="22" rx="2" fill="rgba(255,255,255,0.02)"/>
    <circle cx="18" cy="153" r="2" fill="rgba(255,255,255,0.1)"/>
    <text x="28" y="157" font-size="8" fill="rgba(255,255,255,0.3)" font-family="monospace">Spread 4</text>
    <text x="120" y="157" font-size="7" fill="rgba(255,255,255,0.15)" font-family="monospace">7–8</text>

    <rect x="8" y="168" width="144" height="22" rx="2" fill="rgba(255,255,255,0.02)"/>
    <circle cx="18" cy="179" r="2" fill="rgba(255,255,255,0.1)"/>
    <text x="28" y="183" font-size="8" fill="rgba(255,255,255,0.3)" font-family="monospace">Spread 5</text>
    <text x="120" y="183" font-size="7" fill="rgba(255,255,255,0.15)" font-family="monospace">9–10</text>

    <rect x="8" y="194" width="144" height="22" rx="2" fill="rgba(255,255,255,0.02)"/>
    <rect x="8" y="220" width="144" height="22" rx="2" fill="rgba(255,255,255,0.02)"/>
    <rect x="8" y="246" width="144" height="22" rx="2" fill="rgba(255,255,255,0.02)"/>
    <rect x="8" y="272" width="144" height="22" rx="2" fill="rgba(255,255,255,0.02)"/>
    <rect x="8" y="298" width="144" height="22" rx="2" fill="rgba(255,255,255,0.02)"/>
  </g>

  <!-- ── CENTER: Spread View ── -->
  <!-- Left page (cover — blank / dimmed) -->
  <rect x="200" y="80" width="240" height="300" fill="#e8e4e0" rx="1"
        style="filter: drop-shadow(8px 8px 20px rgba(0,0,0,0.5))"/>
  <rect x="200" y="80" width="240" height="300" fill="rgba(0,0,0,0.35)" rx="1"/>
  <text x="320" y="238" font-size="8" fill="rgba(0,0,0,0.2)" text-anchor="middle" letter-spacing="4" font-family="monospace">BLANK</text>

  <!-- Right page (full-bleed photo) -->
  <rect x="441" y="80" width="240" height="300" fill="#fdfbf9" rx="1"
        style="filter: drop-shadow(-8px 8px 20px rgba(0,0,0,0.5))"/>
  <!-- Photo fill -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ba7c4"/>
      <stop offset="60%" stop-color="#c4a882"/>
      <stop offset="100%" stop-color="#8a7060"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.08)"/>
    </linearGradient>
    <clipPath id="rightpage">
      <rect x="441" y="80" width="240" height="300" rx="1"/>
    </clipPath>
  </defs>
  <rect x="441" y="80" width="240" height="300" fill="url(#sky)" clip-path="url(#rightpage)"/>
  <!-- Simulated landscape photo content -->
  <ellipse cx="530" cy="240" rx="60" ry="80" fill="rgba(80,60,50,0.5)" clip-path="url(#rightpage)"/>
  <ellipse cx="620" cy="260" rx="50" ry="70" fill="rgba(60,50,40,0.4)" clip-path="url(#rightpage)"/>
  <rect x="441" y="310" width="240" height="70" fill="rgba(60,45,35,0.6)" clip-path="url(#rightpage)"/>
  <rect x="441" y="80" width="240" height="300" fill="url(#highlight)" clip-path="url(#rightpage)"/>
  <!-- Page number -->
  <text x="666" y="368" font-size="7" fill="rgba(156,163,175,0.5)" text-anchor="end" font-family="monospace">1</text>

  <!-- Spine -->
  <rect x="440" y="80" width="2" height="300" fill="rgba(0,0,0,0.4)"/>

  <!-- Gutter shadows -->
  <rect x="441" y="80" width="30" height="300" fill="url(#lgut)" clip-path="url(#rightpage)"/>
  <defs>
    <linearGradient id="lgut" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
  </defs>

  <!-- Nav arrows -->
  <circle cx="174" cy="230" r="14" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="174" y="234" font-size="11" fill="rgba(100,100,100,0.6)" text-anchor="middle">←</text>
  <circle cx="707" cy="230" r="14" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="707" y="234" font-size="11" fill="rgba(249,115,22,0.5)" text-anchor="middle">→</text>

