  <text x="295" y="415" font-size="8" fill="rgba(255,255,255,0.18)" font-family="monospace">Cover</text>
  <text x="430" y="415" font-size="8" fill="rgba(255,255,255,0.18)" text-anchor="middle" font-family="monospace">Spread 1 / 11</text>
  <text x="567" y="415" font-size="8" fill="rgba(255,255,255,0.18)" text-anchor="end" font-family="monospace">p.1</text>
